<div class="product-grid">
    <div class="button">
        <div class="add-button">
            <button class="btn btn-primary" onclick='showForms("addMode")'>Add Product</button>
            <button class="btn btn-secondary" onclick='showForms("searchMode")'>Load Data</button>
            <button class="btn btn-secondary">Cancel</button>
        </div>
    </div>
    <div class="Mode">
    <div class="searchMode d-none mt-5">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Search Products</h5>
            </div>
        </div>
    </div>

    <div class="addMode d-none mt-5">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Add New Product</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Product Name">
                    </div>
                    <div class="col-md-6">
                        <input type="number" class="form-control" placeholder="Price">
                    </div>
                    <div class="col-md-8">
                        <input type="text" class="form-control" placeholder="Description">
                    </div>
                    <div class="col-md-4">
                        <select class="form-control categoryDropdown"></select>
                    </div>

                    <button class="btn btn-primary"> Add Product </button>
                </div>

        </div>

    </div>

    </div>

    </div>
</div>
