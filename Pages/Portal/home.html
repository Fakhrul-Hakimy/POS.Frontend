<body>
    <div class="parent">
        <div class="header">
            <p>POS SYSTEM</p>
        </div>
       <div class="nav">
        <ul>
            <li><a href="#" class="active" onclick="loadPage('dashboard.html', this)">Dashboard</a></li>
            <li><a href="#" onclick="loadPage('products.html', this)">Products</a></li>
            <li><a href="#" onclick="loadPage('category.html', this)">Category</a></li>

<script>


    async function loadPage(pageUrl, clickedLink) {
        const contentDiv = document.querySelector('.content');

        // Update active nav link
        if (clickedLink) {
            $('.nav ul li a').removeClass('active');
            $(clickedLink).addClass('active');
        }

        try {
            const response = await fetch(pageUrl);
            if (!response.ok) throw new Error('Page not found');
            const html = await response.text();
            contentDiv.innerHTML = html;
        } catch (error) {
            contentDiv.innerHTML = "<h2>Error loading page</h2><p>Please try again later.</p>";
            console.error(error);
        }
    }

</script>
