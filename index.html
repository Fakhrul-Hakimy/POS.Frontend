<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System</title>
    <style>
        :root {
            --bg-deep: #0b1220;
            --bg-mid: #1e3a8a;
            --glow-a: #0ea5e9;
            --glow-b: #f97316;
            --text: #e2e8f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 20% 15%, rgba(14, 165, 233, 0.32), rgba(14, 165, 233, 0) 34%),
                radial-gradient(circle at 80% 85%, rgba(249, 115, 22, 0.3), rgba(249, 115, 22, 0) 36%),
                linear-gradient(140deg, var(--bg-deep), var(--bg-mid) 58%, #0b1220);
            overflow: hidden;
        }

        #load {
            position: relative;
            width: min(86vw, 620px);
            height: 64px;
            user-select: none;
            cursor: default;
        }

        #load div {
            position: absolute;
            width: 54px;
            height: 54px;
            top: 4px;
            opacity: 0;
            font-size: clamp(2rem, 5vw, 3rem);
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            font-weight: 800;
            color: var(--text);
            text-shadow: 0 0 14px rgba(14, 165, 233, 0.65);
            animation: loading-wave 2.1s linear infinite;
            transform: rotate(180deg);
        }

        #load div:nth-child(1) { animation-delay: 0s; }
        #load div:nth-child(2) { animation-delay: 0.2s; }
        #load div:nth-child(3) { animation-delay: 0.4s; }
        #load div:nth-child(4) { animation-delay: 0.6s; }
        #load div:nth-child(5) { animation-delay: 0.8s; }
        #load div:nth-child(6) { animation-delay: 1s; }
        #load div:nth-child(7) { animation-delay: 1.2s; }

        @keyframes loading-wave {
            0% {
                left: 0;
                opacity: 0;
                transform: rotate(180deg) scale(0.86);
                color: var(--glow-a);
            }

            40% {
                left: 43%;
                opacity: 1;
                transform: rotate(0deg) scale(1);
                color: var(--text);
            }

            64% {
                left: 57%;
                opacity: 1;
                transform: rotate(0deg) scale(1);
                color: var(--glow-b);
            }

            100% {
                left: 100%;
                opacity: 0;
                transform: rotate(-180deg) scale(0.86);
                color: var(--glow-a);
            }
        }

        @media (max-width: 520px) {
            #load {
                height: 56px;
            }

            #load div {
                width: 44px;
                height: 44px;
                top: 6px;
            }
        }
    </style>
</head>
<body>
    <div id="load">
  <div>G</div>
  <div>N</div>
  <div>I</div>
  <div>D</div>
  <div>A</div>
  <div>O</div>
  <div>L</div>
</div>
</body>
</html>
